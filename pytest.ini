[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    slow: marks tests as slow (LSTM training, NSGA-II runs) — skipped by default
    validation: marks tests as simulator validation (first-principles correlation checks)
    e2e: end-to-end tests that talk to a live uvicorn server (subprocess)
    browser: browser-driven E2E test (gated by --run-browser)
